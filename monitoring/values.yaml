# Helm values for prometheus-community/kube-prometheus-stack, deployed
# in the `monitoring` namespace on EVERY cluster (rp-aws, rp-gcp, rp-azure).
#
# Why per-cloud (not centralized on rp-aws):
# 1. Survivability — the centralized design lost all observability the
#    moment AWS got cordoned (Demo B's exact failure mode). Per-cloud
#    Prometheus + Grafana keeps each cloud's view alive when its peers
#    are down.
# 2. No cross-cloud egress on the metrics path. Each Prometheus scrapes
#    only LOCAL broker pods via the PodMonitor in
#    monitoring/redpanda-podmonitor.yaml.
# 3. The trade-off is ~$0.30/hr in extra compute (3× Prometheus +
#    3× Grafana). Worth it — the centralized model's $0.01/hr egress
#    saving doesn't justify losing observability during an outage.
#
# Same values file is applied to all 3 clusters by install-monitoring.sh.
# No cloud-specific bits here — the chart's default Service type=LoadBalancer
# uses each cloud's native LB (NLB on AWS, Network LB on GCP, Standard LB
# on Azure) without explicit annotations.
#
# Disable Alertmanager (no alerting policies in this scaffold) and
# kubeControllerManager / kubeScheduler / kubeEtcd (managed-K8s control
# planes don't expose those scrape targets).
crds:
  enabled: true

alertmanager:
  enabled: false

kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false  # eBPF kubeProxyReplacement is on — there's no kube-proxy

prometheus:
  prometheusSpec:
    # Pick up any ServiceMonitor / PodMonitor regardless of release label
    # (the chart defaults to "release: <release>" matching). Demo-friendly.
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    # Local-cluster broker scrape: defined as a PodMonitor (kept in
    # monitoring/redpanda-podmonitor.yaml). The Prometheus operator
    # discovers it via labels — no additionalScrapeConfigsSecret needed.
    retention: 6h
    resources:
      requests:
        cpu: "200m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "4Gi"

grafana:
  enabled: true
  adminUser: admin
  # adminPassword left unset → chart auto-generates a random one and stores
  # it in the `<release>-grafana` Secret under key `admin-password`.
  # install-monitoring.sh reads that secret at the end and prints it.
  service:
    type: LoadBalancer
    port: 80
    # NO cloud-specific annotations — same values file is applied to
    # all 3 clusters. Each cloud's default LB type works:
    #   AWS: classic ELB (cheaper than NLB for HTTP, sufficient for
    #        Grafana web UI; if you want NLB on AWS, add the
    #        service.beta.kubernetes.io/aws-load-balancer-type: nlb
    #        annotation in a per-cloud values override).
    #   GCP: Network Load Balancer (regional, IP-based).
    #   Azure: Standard Load Balancer (Public IP, included in AKS).
  # We only want the Redpanda dashboards in this scaffold (Default + Ops,
  # loaded via labelled ConfigMaps by install-monitoring.sh). Disabling
  # the chart's ~20 bundled K8s dashboards (apiserver, nodes, pods,
  # kubelet, prometheus, ...) keeps the Grafana UI focused on what the
  # demo cares about.
  defaultDashboardsEnabled: false
  # The dashboard sidecar picks up any ConfigMap with this label and
  # provisions it as a Grafana dashboard automatically. We label
  # monitoring/redpanda-dashboard-cm.yaml with grafana_dashboard=1 so the
  # Redpanda dashboard shows up without manual import.
  #
  # Do NOT set `folder: Redpanda` (or any non-default folder name): the
  # kube-prometheus-stack sidecar tries to create the folder via the
  # Grafana API at startup, fails with `Error: insufficient privileges
  # to create Redpanda`, and then SKIPS EVERY DASHBOARD. Caught during
  # 2026-05-04 e2e v3 — every chart-bundled dashboard plus our
  # redpanda-dashboard ConfigMap was being silently dropped. Letting
  # dashboards land in the default "General" folder bypasses the folder
  # creation entirely and they all load.
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
    datasources:
      enabled: true
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
