# Additional Prometheus scrape config injected via Secret. Picked up by
# kube-prometheus-stack through `prometheus.prometheusSpec
# .additionalScrapeConfigsSecret`.
#
# With operator flat-mode cross-cluster networking, the `redpanda`
# Service's EndpointSlices in this cluster contain peer broker pod IPs
# from rp-gcp and rp-azure as well. Combined with Cilium ClusterMesh
# routing, scraping the `admin` port (9644) here reaches all 5 brokers
# regardless of which cloud their pods are running in.
- job_name: redpanda-cross-cluster
  metrics_path: /public_metrics
  scheme: http
  scrape_interval: 15s
  scrape_timeout: 10s
  kubernetes_sd_configs:
    - role: endpoints
      namespaces:
        names:
          - redpanda
  relabel_configs:
    # Only the headless redpanda Service's `admin` (9644) port.
    - source_labels:
        - __meta_kubernetes_service_name
        - __meta_kubernetes_endpoint_port_name
      regex: redpanda;admin
      action: keep
    # Carry rack (cloud) and broker pod name through as labels so the
    # Grafana dashboard's "by rack" panels work without hardcoding pod
    # names. The operator labels broker pods with
    # `app.kubernetes.io/instance=rp-<cloud>` from the helm release name.
    - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_instance]
      target_label: rack
      regex: rp-(.+)
      replacement: $1
    - source_labels: [__meta_kubernetes_pod_name]
      target_label: pod
    - source_labels: [__meta_kubernetes_namespace]
      target_label: namespace
