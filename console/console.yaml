# Redpanda Console managed by the Redpanda Operator (Console CRD,
# cluster.redpanda.com/v1alpha2). The operator reconciles a Deployment +
# Service + ConfigMap from this single CR, deriving broker / Admin API /
# Schema Registry endpoints + TLS + auth from the StretchCluster it
# references via spec.cluster.clusterRef.
#
# Why CR instead of the standalone helm chart: the Console chart needs
# every endpoint, port, and TLS toggle wired in by hand and re-rendered
# whenever the StretchCluster's listener config changes. The CR pulls all
# of that from the StretchCluster directly, so toggling broker TLS later
# (issue #1499 follow-up) won't require touching this file. Per the
# operator-managed deployment doc:
# https://docs.redpanda.com/current/deploy/console/kubernetes/deploy/
#
# Lives in the `redpanda` namespace alongside the StretchCluster — the
# operator's clusterRef lookup is namespaced and won't find a cluster
# in a different namespace without an explicit `namespace` field.
apiVersion: cluster.redpanda.com/v1alpha2
kind: Console
metadata:
  name: redpanda-console
  namespace: redpanda
spec:
  cluster:
    clusterRef:
      name: redpanda
  # Single replica is enough for a demo; bump for an HA Console.
  replicaCount: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  # Service type=LoadBalancer so the demo URL is reachable from the
  # presenter's laptop. NLB annotations match the rest of the scaffold —
  # classic ELBs leak SGs on teardown (see gotcha #2 in the 2026-05-01
  # validation memory). install-console.sh kubectl-patches these onto the
  # operator-managed Service if the CR's spec.service.annotations field
  # isn't honored by the operator version in use.
  service:
    type: LoadBalancer
    port: 8080
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: nlb
      service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
      service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
