# Helm values for the Redpanda Console chart (redpanda-data/console).
#
# Targets the cross-cloud StretchCluster from inside rp-aws. Console runs in
# its own `console` namespace on rp-aws only — the operator's flat-mode
# EndpointSlices ensure the headless `redpanda.redpanda.svc.cluster.local`
# Service on this cluster resolves to all 5 broker pod IPs (2 AWS + 2 GCP +
# 1 Azure), and Cilium ClusterMesh routes pod-to-pod across clouds, so
# Console gets a full cross-cluster view from a single deployment.
#
# Listener ports match the StretchCluster manifest: Kafka 9092 / Admin 9644
# / Schema Registry 8081, all PLAINTEXT (broker TLS is off — see the
# stretchcluster.yaml comment block for why; cross-cloud encryption is
# already provided by the IPsec VPN tier).
#
# Service type=LoadBalancer so the demo URL is reachable from the
# presenter's laptop. AWS NLB annotation set so we get an NLB rather than
# the default classic ELB (which leaks SGs on teardown).
console:
  config:
    kafka:
      brokers:
        - redpanda.redpanda.svc.cluster.local:9092
      tls:
        enabled: false
      sasl:
        enabled: false
    redpanda:
      adminApi:
        enabled: true
        urls:
          - http://redpanda.redpanda.svc.cluster.local:9644
        tls:
          enabled: false
    schemaRegistry:
      enabled: true
      urls:
        - http://redpanda.redpanda.svc.cluster.local:8081
      tls:
        enabled: false

service:
  type: LoadBalancer
  port: 8080
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# Console OSS has no built-in auth. The presenter URL is unauthenticated by
# design here — fine for a demo over a short-lived NLB. For anything beyond
# a demo, layer SSO via `console.config.login` (Enterprise) or front Console
# with an ingress + basic-auth.
