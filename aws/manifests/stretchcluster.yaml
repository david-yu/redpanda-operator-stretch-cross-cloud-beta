apiVersion: cluster.redpanda.com/v1alpha2
kind: StretchCluster
metadata:
  name: redpanda
  namespace: redpanda
spec:
  rbac:
    enabled: true
  external:
    enabled: false
  # Flat cross-cluster networking: the operator manages headless Services
  # and EndpointSlices pointing at peer-cluster broker pod IPs. With
  # Cilium ClusterMesh providing the pod-IP routing layer, brokers in
  # other clouds are reachable directly by their pod IPs from this cluster.
  networking:
    crossClusterMode: flat
  # Rack awareness reads from a node ANNOTATION (not label). The bootstrap
  # script applies `redpanda.com/cloud=aws` to every node in this cluster
  # so the rack name is the cloud, not the AWS region — keeps
  # default_leaders_preference readable across clouds.
  rackAwareness:
    enabled: true
    nodeAnnotation: redpanda.com/cloud
  tls:
    enabled: true
    certs:
      default:
        caEnabled: true
  enterprise:
    licenseSecretRef:
      name: redpanda-license
      key: license.key
  config:
    cluster:
      # Pin leaders (and controller) to the AWS rack. NOTE: when multiple
      # racks are listed, Redpanda distributes leaders *equally* across
      # them (per cluster-properties docs) — there is NO priority
      # fallback. So a single-rack value is what actually pins leaders;
      # listing all three clouds spreads leadership 1/3 to each which
      # adds cross-cloud egress for every produce. For our triple,
      # us-east-1 (aws) has the lowest sum-of-pairwise-RTT to us-east1
      # (gcp ~12ms) and eastus (azure ~5ms), so it's also the safest
      # rack to keep the controller in.
      default_leaders_preference: "racks:aws"
      # Demo-friendly autobalancer timeouts. Production: raise both
      # substantially (Redpanda's defaults are 900 / 600).
      partition_autobalancing_node_availability_timeout_sec: 30
      partition_autobalancing_node_autodecommission_timeout_sec: 60
      partition_autobalancing_mode: continuous
      partition_autobalancing_max_disk_usage_percent: 80
