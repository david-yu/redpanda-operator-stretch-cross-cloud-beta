apiVersion: cluster.redpanda.com/v1alpha2
kind: StretchCluster
metadata:
  name: redpanda
  namespace: redpanda
spec:
  rbac:
    enabled: true
  external:
    enabled: false
  # Flat cross-cluster networking: the operator manages headless Services
  # and EndpointSlices pointing at peer-cluster broker pod IPs. With
  # Cilium ClusterMesh providing the pod-IP routing layer, brokers in
  # other clouds are reachable directly by their pod IPs from this cluster.
  networking:
    crossClusterMode: flat
  # Rack awareness reads from a node ANNOTATION (not label). The bootstrap
  # script applies `redpanda.com/cloud=aws` to every node in this cluster
  # so the rack name is the cloud, not the AWS region — keeps
  # default_leaders_preference readable across clouds.
  rackAwareness:
    enabled: true
    nodeAnnotation: redpanda.com/cloud
  # Broker TLS is *off* for this cross-cloud scaffold. Two reasons:
  #
  # 1. Confidentiality is already covered at a lower layer. Every byte
  #    that crosses a cloud boundary rides over the IPsec VPN tunnels
  #    provisioned by `vpn/terraform/`:
  #
  #      AWS: aws_vpn_connection — IKEv2 + AES-256-GCM (default)
  #      GCP: google_compute_vpn_tunnel via google_compute_ha_vpn_gateway
  #           — IKEv2 + AES-256-GCM
  #      Azure: azurerm_virtual_network_gateway_connection — IKEv2 +
  #             AES-256-GCM
  #
  #    Pod-to-pod traffic between brokers in different clouds is
  #    encapsulated by Cilium in Geneve, then encrypted again by the
  #    cloud VPN gateway as the underlay UDP packet hits the WAN. By
  #    the time any byte is on the public Internet between two clouds
  #    it has already been authenticated and encrypted by IPsec.
  #    Adding broker-level TLS on top is double encryption for the same
  #    hop — useful only if you want a defense-in-depth layer in case
  #    the VPN drops, which would also break pod-IP routing entirely
  #    so brokers couldn't talk regardless.
  #
  # 2. The Redpanda operator's auto-generated cert SANs (`*.redpanda`,
  #    `*.redpanda.svc`, etc.) are rejected by strict TLS hostname
  #    verification (RFC 6125 forbids wildcards on single-label parent
  #    domains, like `*.com`). Brokers complete the TLS handshake then
  #    the RPC client drops the connection with `rpc::errc:4` /
  #    "Broken pipe" because OpenSSL reports `verify error:num=62:
  #    hostname mismatch`. The operator doesn't expose a way to add
  #    explicit per-broker SANs or to skip hostname verification on
  #    cross-cluster RPC, so this would need an upstream fix.
  #
  # We keep `scripts/bootstrap-shared-ca.sh` and the per-cluster
  # `redpanda-shared-ca-issuer` around for when this is enabled — once
  # the SAN issue is resolved upstream the change here is just
  # enabled: true + restoring the issuerRef block.
  tls:
    enabled: false
  enterprise:
    licenseSecretRef:
      name: redpanda-license
      key: license.key
  config:
    cluster:
      # Pin leaders (and controller) to the AWS rack. NOTE: when multiple
      # racks are listed, Redpanda distributes leaders *equally* across
      # them (per cluster-properties docs) — there is NO priority
      # fallback. So a single-rack value is what actually pins leaders;
      # listing all three clouds spreads leadership 1/3 to each which
      # adds cross-cloud egress for every produce. For our triple,
      # us-east-1 (aws) has the lowest sum-of-pairwise-RTT to us-east1
      # (gcp ~12ms) and eastus (azure ~5ms), so it's also the safest
      # rack to keep the controller in.
      default_leaders_preference: "racks:aws"
      # Demo-friendly autobalancer timeouts. Production: raise both
      # substantially (Redpanda's defaults are 900 / 600).
      partition_autobalancing_node_availability_timeout_sec: 30
      partition_autobalancing_node_autodecommission_timeout_sec: 60
      partition_autobalancing_mode: continuous
      partition_autobalancing_max_disk_usage_percent: 80
