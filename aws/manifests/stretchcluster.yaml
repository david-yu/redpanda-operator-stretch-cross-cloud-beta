apiVersion: cluster.redpanda.com/v1alpha2
kind: StretchCluster
metadata:
  name: redpanda
  namespace: redpanda
spec:
  rbac:
    enabled: true
  external:
    enabled: false
  # Flat cross-cluster networking: the operator manages headless Services
  # and EndpointSlices pointing at peer-cluster broker pod IPs. With
  # Cilium ClusterMesh providing the pod-IP routing layer, brokers in
  # other clouds are reachable directly by their pod IPs from this cluster.
  networking:
    crossClusterMode: flat
  # Rack awareness reads from a node ANNOTATION (not label). The bootstrap
  # script applies `redpanda.com/cloud=aws` to every node in this cluster
  # so the rack name is the cloud, not the AWS region — keeps
  # default_leaders_preference readable across clouds.
  rackAwareness:
    enabled: true
    nodeAnnotation: redpanda.com/cloud
  # Broker TLS is *off* for this cross-cloud scaffold. Two reasons:
  #
  # 1. Confidentiality is already covered at a lower layer. Every byte
  #    that crosses a cloud boundary rides over the IPsec VPN tunnels
  #    provisioned by `vpn/terraform/`:
  #
  #      AWS: aws_vpn_connection — IKEv2 + AES-256-GCM (default)
  #      GCP: google_compute_vpn_tunnel via google_compute_ha_vpn_gateway
  #           — IKEv2 + AES-256-GCM
  #      Azure: azurerm_virtual_network_gateway_connection — IKEv2 +
  #             AES-256-GCM
  #
  #    Pod-to-pod traffic between brokers in different clouds is
  #    encapsulated by Cilium in Geneve, then encrypted again by the
  #    cloud VPN gateway as the underlay UDP packet hits the WAN. By
  #    the time any byte is on the public Internet between two clouds
  #    it has already been authenticated and encrypted by IPsec.
  #    Adding broker-level TLS on top is double encryption for the same
  #    hop — useful only if you want a defense-in-depth layer in case
  #    the VPN drops, which would also break pod-IP routing entirely
  #    so brokers couldn't talk regardless.
  #
  # 2. The Redpanda operator's auto-generated cert SANs (`*.redpanda`,
  #    `*.redpanda.svc`, etc.) are rejected by strict TLS hostname
  #    verification (RFC 6125 forbids wildcards on single-label parent
  #    domains, like `*.com`). Brokers complete the TLS handshake then
  #    the RPC client drops the connection with `rpc::errc:4` /
  #    "Broken pipe" because OpenSSL reports `verify error:num=62:
  #    hostname mismatch`. The operator doesn't expose a way to add
  #    explicit per-broker SANs or to skip hostname verification on
  #    cross-cluster RPC, so this would need an upstream fix.
  #
  # When the upstream operator can either emit explicit per-broker
  # SANs or skip hostname verification on cross-cluster RPC clients,
  # this becomes `enabled: true` + a `certs.default.issuerRef` pointing
  # at a pre-bootstrapped shared CA Issuer (one root distributed to
  # every cluster's redpanda namespace, since each cluster's local
  # cert-manager would otherwise mint a different self-signed root).
  tls:
    enabled: false
  # spec.tls.enabled: false alone is not enough — the chart still emits
  # external listeners with kafka_api_tls / admin_api_tls / pandaproxy_api_tls
  # / schema_registry_api_tls referencing /etc/tls/certs/external/*, which
  # don't exist with tls disabled. Explicitly disable TLS on every external
  # listener so the operator's generated config matches the (no-cert) reality.
  listeners:
    kafka:
      tls: { enabled: false }
      external:
        default:
          tls: { enabled: false }
    admin:
      tls: { enabled: false }
      external:
        default:
          tls: { enabled: false }
    http:
      tls: { enabled: false }
      external:
        default:
          tls: { enabled: false }
    schemaRegistry:
      tls: { enabled: false }
      external:
        default:
          tls: { enabled: false }
    rpc:
      tls: { enabled: false }
  enterprise:
    licenseSecretRef:
      name: redpanda-license
      key: license.key
  config:
    cluster:
      # Pin leaders to AWS in steady state, fall through to GCP then Azure
      # on outage. The two prefix forms have different semantics — the
      # older `racks:<r1>,<r2>,…` is a *constrained set* (leaders distribute
      # equally across listed racks, no priority order); `ordered_racks:`
      # (Redpanda 26.1+, see leader-pinning docs) is a priority list:
      # leaders sit in the first reachable rack and fall over to each
      # subsequent rack only when higher-priority racks are unavailable.
      #
      # us-east-1 (aws) has the lowest sum-of-pairwise-RTT to us-east1 gcp
      # (~12ms) and eastus azure (~5ms), so it's the safest rack to keep
      # leaders + the controller in steady-state. GCP comes second because
      # the AWS↔GCP and GCP↔Azure RTTs are both under the 100ms hardcoded
      # `node_status_rpc` timeout (Azure↔AWS is the marginal pair, so
      # demoting Azure to last protects the controller's heartbeat budget
      # if leadership ever ends up there during a chained outage).
      default_leaders_preference: "ordered_racks:aws,gcp,azure"
      # Demo-friendly autobalancer timeouts. Sized so Demo A's 5-7 min
      # cordon → observe → uncordon cycle finishes BEFORE the autobalancer
      # marks the cordoned brokers unavailable / autodecommissions them.
      # Demo B (autodecommission) wants autodecom_timeout finite, hence the
      # 15-min cap. Production: raise both substantially — a transient
      # regional blip shouldn't trigger an automatic decommission.
      partition_autobalancing_node_availability_timeout_sec: 600
      partition_autobalancing_node_autodecommission_timeout_sec: 900
      partition_autobalancing_mode: continuous
      partition_autobalancing_max_disk_usage_percent: 80
      # 1-hour topic retention. The OMB workload (omb/producer-job.yaml)
      # produces ~30 MB/s with RF=5 — every broker stores 100% of every
      # partition, so disk fills at ~30 MB/s × 60 = 1.8 GB/min per broker.
      # On a 200Gi PVC (set below in spec.storage.persistentVolume.size)
      # at 80% autobalancer threshold, that gives ~90 minutes of headroom
      # before the autobalancer stalls with `Over Disk Limit Nodes`.
      # 1-hour retention keeps the cluster in steady state under sustained
      # load — drift caught during 2026-05-03 e2e validation. Production
      # demos with longer-running workloads should raise this.
      log_retention_ms: 3600000
  # 200Gi per-broker PVC. The operator chart's default of 20Gi fills in
  # ~11 minutes under the OMB 30 MB/s × RF=5 demo workload, which stalls
  # the partition autobalancer (`Over Disk Limit Nodes` for every broker)
  # and prevents leadership from rebalancing back to the AWS rack after
  # a Demo A failover/recovery cycle. 200Gi sized for a multi-hour demo
  # in combination with the 1-hour retention above.
  storage:
    persistentVolume:
      enabled: true
      size: 200Gi
