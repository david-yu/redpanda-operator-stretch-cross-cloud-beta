# OMB-equivalent producer load generator for the cross-cloud StretchCluster.
#
# Targets ~30 MB/s of writes (7680 msg/s × 4 KiB ≈ 30.0 MB/s — about 240 Mbps
# on the wire). That's ~3× what `kafka-producer-perf-test --print-metrics`
# can sustain on a 200m-cpu pod, so resources are bumped accordingly.
#
# Connects PLAINTEXT (broker TLS is intentionally off in this scaffold —
# see aws/manifests/stretchcluster.yaml for why; cross-cloud encryption is
# already provided by the IPsec VPN tier in vpn/terraform/).
#
# Why "OMB" but kafka-perf-test under the hood: same reason as the same-cloud
# beta — OMB-on-VM adds cross-cloud routing + driver-config rendering for no
# extra information; the bundled kafka-perf-test produces the same per-second
# throughput / latency telemetry from inside the redpanda namespace.
apiVersion: batch/v1
kind: Job
metadata:
  name: omb-producer
  namespace: redpanda
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      volumes:
        - name: producer-config
          configMap:
            name: omb-producer-config
      containers:
        - name: producer
          image: apache/kafka:3.8.0
          volumeMounts:
            - name: producer-config
              mountPath: /etc/kafka/producer.properties
              subPath: producer.properties
              readOnly: true
          command:
            - /bin/bash
            - -ec
            - |
              # Headless DNS can take 10-30s after a fresh cluster create.
              for i in $(seq 1 30); do
                getent hosts redpanda.redpanda.svc.cluster.local && break
                sleep 2
              done
              # 7680 msg/s × 4 KiB ≈ 30 MB/s for ~5h before --num-records exits.
              # At that rate the Job's logs are the primary signal — tail
              # them with `kubectl -n redpanda logs -f job/omb-producer`.
              exec /opt/kafka/bin/kafka-producer-perf-test.sh \
                --topic load-test \
                --num-records 138240000 \
                --record-size 4096 \
                --throughput 7680 \
                --producer.config /etc/kafka/producer.properties \
                --print-metrics
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: omb-producer-config
  namespace: redpanda
data:
  producer.properties: |
    # Port 9093, NOT 9092: the operator keeps the TLS-conventional port
    # number even with `tls.enabled: false`. Confirmed via the redpanda
    # headless Service spec.
    bootstrap.servers=redpanda.redpanda.svc.cluster.local:9093
    security.protocol=PLAINTEXT
    # acks=all so a regional outage is visible in the producer's metrics
    # (the producer blocks on min.insync.replicas instead of silently
    # dropping records under broker unavailability).
    acks=all
    linger.ms=5
    batch.size=262144
    compression.type=lz4
    delivery.timeout.ms=120000
    request.timeout.ms=30000
    max.in.flight.requests.per.connection=5
    enable.idempotence=true
