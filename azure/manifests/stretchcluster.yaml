apiVersion: cluster.redpanda.com/v1alpha2
kind: StretchCluster
metadata:
  name: redpanda
  namespace: redpanda
spec:
  rbac:
    enabled: true
  external:
    enabled: false
  # Flat cross-cluster networking: the operator manages headless Services
  # and EndpointSlices pointing at peer-cluster broker pod IPs. With
  # Cilium ClusterMesh providing the pod-IP routing layer, brokers in
  # other clouds are reachable directly by their pod IPs from this cluster.
  networking:
    crossClusterMode: flat
  # Rack awareness reads from a node ANNOTATION (not label). The bootstrap
  # script applies `redpanda.com/cloud=azure` to every node in this cluster
  # so the rack name is the cloud, not the Azure region — keeps
  # default_leaders_preference readable across clouds.
  rackAwareness:
    enabled: true
    nodeAnnotation: redpanda.com/cloud
  # See aws/manifests/stretchcluster.yaml for the full rationale.
  # tl;dr: cross-cloud traffic is already IPsec-encrypted by the VPN
  # tunnels in vpn/terraform/, and the operator-generated TLS cert
  # SANs hit RFC-6125 single-label-parent hostname-mismatch on the
  # advertised RPC hostnames.
  tls:
    enabled: false
  # See aws/manifests/stretchcluster.yaml — every listener has tls
  # disabled explicitly to match the no-cert reality.
  listeners:
    kafka:
      tls: { enabled: false }
      external:
        default:
          tls: { enabled: false }
    admin:
      tls: { enabled: false }
      external:
        default:
          tls: { enabled: false }
    http:
      tls: { enabled: false }
      external:
        default:
          tls: { enabled: false }
    schemaRegistry:
      tls: { enabled: false }
      external:
        default:
          tls: { enabled: false }
    rpc:
      tls: { enabled: false }
  enterprise:
    licenseSecretRef:
      name: redpanda-license
      key: license.key
  config:
    cluster:
      # See aws/manifests/stretchcluster.yaml for the rationale: ordered
      # rack preference pins leaders to AWS in steady state, falls through
      # to GCP then Azure on outage. ordered_racks (Redpanda 26.1+) is a
      # priority list, unlike the older racks: which distributes equally.
      default_leaders_preference: "ordered_racks:aws,gcp,azure"
      partition_autobalancing_node_availability_timeout_sec: 600
      partition_autobalancing_node_autodecommission_timeout_sec: 900
      partition_autobalancing_mode: continuous
      partition_autobalancing_max_disk_usage_percent: 80
      # See aws/manifests/stretchcluster.yaml for rationale: 1-hour retention
      # keeps disk pressure bounded under the OMB 30 MB/s demo workload.
      log_retention_ms: 3600000
  # 200Gi per-broker PVC; chart default of 20Gi is too small for the demo
  # workload. See aws/manifests/stretchcluster.yaml for the math.
  storage:
    persistentVolume:
      enabled: true
      size: 200Gi
